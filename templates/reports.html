{% extends "base.html" %}
{% block content %}
<h2 class="page-title">Reports</h2>

<div class="row">
    <div class="col-md-3 mb-4"><div class="stat-card bg-blue"><h5>Total Tickets</h5><h2>{{ total }}</h2></div></div>
    <div class="col-md-3 mb-4"><div class="stat-card bg-orange"><h5>Unassigned</h5><h2>{{ unassigned }}</h2></div></div>
    <div class="col-md-3 mb-4"><div class="stat-card bg-green"><h5>Resolved</h5><h2>{{ resolved }}</h2></div></div>
    <div class="col-md-3 mb-4"><div class="stat-card bg-red"><h5>Assets</h5><h2>{{ assets }}</h2></div></div>
</div>

<div class="panel">
    <h4>Report Actions</h4>
    <a href="/export-excel" class="btn btn-success mt-3">
        <i class="fa-solid fa-file-excel"></i> Download Excel Report
    </a>

    <a href="/export-pdf" class="btn btn-danger mt-3 ms-2">
        <i class="fa-solid fa-file-pdf"></i> Download PDF Report
    </a>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SupportHub Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="login-body">
<div class="login-card">
    <div class="login-logo">S</div>
    <h2>SupportHub</h2>
    <p>Enterprise IT Support System v2.0</p>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <label class="form-label w-100 text-start">Username / Kullanıcı Adı</label>
        <input class="form-control mb-3" name="username" placeholder="Username / Kullanıcı Adı" required>

        <label class="form-label w-100 text-start">Password / Şifre</label>
        <input class="form-control mb-3" name="password" type="password" placeholder="Password / Şifre" required>

        <button class="btn btn-primary w-100">Sign In / Giriş Yap</button>
    </form>

    <div class="login-users mt-4">
        <strong>Demo Users</strong>
        <p>admin / 1234 — Admin</p>
        <p>ops / 1234 — Operation Supervisor</p>
        <p>expert / 1234 — Expert Technician</p>
        <p>tech / 1234 — Technician</p>
        <p>customer / 1234 — Customer</p>
    </div>
</div>
</body>
</html>

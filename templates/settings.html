{% extends "base.html" %}
{% block content %}
<h2 class="page-title">Settings</h2>

<div class="row">
    <div class="col-lg-6 mb-4">
        <div class="panel">
            <h4>Appearance</h4>
            <p class="text-muted">Siyah/Beyaz tema butonu kalıcıdır.</p>
            <button class="btn btn-dark" onclick="toggleDarkMode()">Siyah / Beyaz Tema</button>
            <button class="btn btn-secondary" onclick="resetTheme()">Reset Theme</button>
        </div>
    </div>

    <div class="col-lg-6 mb-4">
        <div class="panel">
            <h4>System Information</h4>
            <div class="summary-item"><span>Project</span><strong>SupportHub Enterprise</strong></div>
            <div class="summary-item"><span>Version</span><strong>v2.0 Tested</strong></div>
            <div class="summary-item"><span>Framework</span><strong>Flask</strong></div>
            <div class="summary-item"><span>Database</span><strong>SQLite</strong></div>
        </div>
    </div>
</div>
{% endblock %}

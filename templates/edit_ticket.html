{% extends "base.html" %}

{% block content %}
<h2 class="page-title">Edit / Assign Request</h2>

<div class="panel">
    <form method="POST">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Customer Name</label>
                <input name="customer_name" value="{{ ticket.customer_name }}" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Department</label>
                <input name="department" value="{{ ticket.department }}" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Branch</label>
                <input name="branch" value="{{ ticket.branch }}" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Category</label>
                <input name="category" value="{{ ticket.category }}" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Title</label>
                <input name="title" value="{{ ticket.title }}" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Device Type</label>
                <input name="device_type" value="{{ ticket.device_type }}" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Priority</label>
                <select name="priority" class="form-select">
                    <option {% if ticket.priority=="Low" %}selected{% endif %}>Low</option>
                    <option {% if ticket.priority=="Medium" %}selected{% endif %}>Medium</option>
                    <option {% if ticket.priority=="High" %}selected{% endif %}>High</option>
                    <option {% if ticket.priority=="Critical" %}selected{% endif %}>Critical</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Status</label>
                <select name="status" class="form-select">
                    <option {% if ticket.status=="Open" %}selected{% endif %}>Open</option>
                    <option {% if ticket.status=="In Progress" %}selected{% endif %}>In Progress</option>
                    <option {% if ticket.status=="Resolved" %}selected{% endif %}>Resolved</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Assign to Technician</label>
                {% if session.get("role") in ["Admin","Operation Supervisor","Expert Technician"] %}
                <select name="assigned_to" class="form-select">
                    <option>Unassigned</option>
                    {% for technician in technicians %}
                    <option {% if ticket.assigned_to==technician.full_name %}selected{% endif %}>{{ technician.full_name }}</option>
                    {% endfor %}
                </select>
                {% else %}
                <input name="assigned_to" value="{{ ticket.assigned_to }}" class="form-control" readonly>
                {% endif %}
            </div>

            <div class="col-12 mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="5" required>{{ ticket.description }}</textarea>
            </div>
        </div>

        <button class="btn btn-primary">Save Changes</button>
        <a href="/tickets" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
